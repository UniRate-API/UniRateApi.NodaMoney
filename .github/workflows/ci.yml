name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /warnaserror

      - name: Test
        run: dotnet test -c Release --no-build --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/UniRateApi.NodaMoney/UniRateApi.NodaMoney.csproj -c Release --no-build -o ./artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 7
