name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  # Reserved for the migration to NuGet Trusted Publishing (OIDC) once the
  # package is registered on nuget.org. Until then, we use a scoped API key
  # stored in the NUGET_API_KEY repo secret.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /warnaserror

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/UniRateApi.NodaMoney/UniRateApi.NodaMoney.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
          retention-days: 90
